<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MBBS Question Bank - Chapters</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
font-size:18px;
color:#0d6efd;
}

.chapter{
background:white;
padding:18px;
margin:12px 0;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.12);
cursor:pointer;
font-size:18px;
font-weight:bold;
transition:.2s;
}

.chapter:hover{
transform:scale(1.02);
}

.count{
float:right;
background:#0d6efd;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:14px;
}

</style>

</head>
