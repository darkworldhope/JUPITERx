<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Questions</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

h1{
  text-align:center;
}

.question{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 5px #ccc;
}

.count{
  float:right;
  background:red;
  color:white;
  padding:3px 10px;
  border-radius:20px;
}
</style>
</head>

<body>

<h1 id="title">Questions</h1>
  <input
id="search"
type="text"
placeholder="Search Questions..."
onkeyup="searchQuestions()"
style="width:100%;padding:12px;font-size:18px;margin:20px 0;border-radius:8px;">

<div id="question-list"></div>

<script src="js/questions.js"></script>
  function searchQuestions(){

let input = document.getElementById("search").value.toLowerCase();

let questions = document.getElementsByClassName("question");

for(let i=0;i<questions.length;i++){

let text = questions[i].innerText.toLowerCase();

questions[i].style.display =
text.includes(input) ? "block" : "none";

}

}

</body>
</html>
