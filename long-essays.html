<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Community Medicine - Long Essays</title>
<style>
body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}
h1{
text-align:center;
}
.question{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 0 5px #ccc;
}
</style>
</head>

<body>

<h1>Community Medicine - Long Essays</h1>
<input id="search" type="text" placeholder="Search Question..." onkeyup="searchQuestions()" style="width:90%;padding:12px;font-size:18px;margin:20px;border-radius:8px;">

<div id="question-list"></div>

<script>
function searchQuestions(){
let input=document.getElementById("search").value.toLowerCase();
let questions=document.getElementsByClassName("question");
for(let i=0;i<questions.length;i++){
questions[i].style.display=questions[i].innerText.toLowerCase().includes(input)?"":"none";
}
}
</script>
<script src="js/app.js"></script>

</body>
</html>
