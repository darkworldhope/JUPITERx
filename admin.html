<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBBS Question Bank - Admin</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:500px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

button{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
cursor:pointer;
}
</style>
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
}

button {
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 8px;
}
</head>

<body>

<h1>Admin Panel</h1>

<div class="card">

<button>Add MBBS Year</button>

<button>Add Subject</button>

<button>Add Paper</button>

<button>Add Chapter</button>

<button>Add Question</button>

<button>Import PDF (Coming Soon)</button>

</div>
<h2>Add Subject</h2>

<input type="text" id="subject" placeholder="Subject Name">

<select id="year">
  <option value="1">1st MBBS</option>
  <option value="2">2nd MBBS</option>
  <option value="3">3rd MBBS</option>
  <option value="4">Final MBBS</option>
</select>

<button id="addSubject">Add Subject</button>

<hr>

<div id="result"></div>
</body>
</html>
