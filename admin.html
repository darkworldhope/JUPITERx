<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBBS Question Bank - Admin</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    margin:15px auto;
    border-radius:12px;
    max-width:500px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:18px;
    cursor:pointer;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
}

button:hover{
    background:#0b5ed7;
}

#result{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>MBBS Question Bank</h1>

<div class="card">

<h2>Add Subject</h2>

<input
type="text"
id="subject"
placeholder="Enter Subject Name">

<select id="year">
<option value="1">1st MBBS</option>
<option value="2">2nd MBBS</option>
<option value="3">3rd MBBS</option>
<option value="4">Final MBBS</option>
</select>

<button id="addSubject">
Add Subject
</button>

<div id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script type="module" src="js/admin.js"></script>
<h1>📚 MBBS Question Bank Admin</h1>

<div class="card">
  <h2>Upload PDF</h2>

  <input type="file" id="pdfFile" accept=".pdf">

  <br><br>

  <button onclick="uploadPDF()">
    Upload PDF
  </button>

  <p id="status"></p>
</div>

<script src="js/admin.js"></script>
</body>
</html>
